services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-chatbot}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-chatbot}
      - POSTGRES_DB=${POSTGRES_DB:-chatbot}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatbot}"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - apps/api/.env
    environment:
      - NODE_ENV=production
      - GOWA_BASE_URL=http://gowa:3000
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://${POSTGRES_USER:-chatbot}:${POSTGRES_PASSWORD:-chatbot}@postgres:5432/${POSTGRES_DB:-chatbot}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  gowa:
    build:
      context: ../GOWA
      dockerfile: docker/golang.Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ../GOWA/src/.env
    environment:
      - WHATSAPP_WEBHOOK=http://api:3001/webhooks/gowa/messages
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - gowa-storages:/app/storages
      - gowa-statics:/app/statics
    restart: on-failure
    depends_on:
      api:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

volumes:
  postgres-data:
  redis-data:
  gowa-storages:
  gowa-statics:
