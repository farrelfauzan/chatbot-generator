services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - apps/api/.env
    environment:
      - NODE_ENV=production
      - GOWA_BASE_URL=http://gowa:3000
      - REDIS_URL=redis://redis:6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  gowa:
    build:
      context: ../GOWA
      dockerfile: docker/golang.Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ../GOWA/src/.env
    environment:
      - WHATSAPP_WEBHOOK=http://api:3001/webhooks/gowa/messages
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - gowa-storages:/app/storages
      - gowa-statics:/app/statics
    restart: on-failure
    depends_on:
      api:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:3001}
    ports:
      - "${DASHBOARD_PORT:-3002}:3002"
    environment:
      - PORT=3002
      - HOST=0.0.0.0
    restart: unless-stopped

volumes:
  redis-data:
  gowa-storages:
  gowa-statics:
